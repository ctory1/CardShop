<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Card Condition Viewer | CardShop Collectables</title>
    <link rel="icon" type="image/png" href="images/Favicon-circle.png">
    <link rel="apple-touch-icon" href="images/Favicon-circle.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css?v=card-viewer-1" rel="stylesheet">
  </head>
  <body class="card-viewer-page">
    <main class="viewer-shell">
      <a class="viewer-back-link" href="pokemon.html">&larr; Back to Pokemon Stock</a>
      <header class="viewer-header">
        <div>
          <p class="eyebrow dark">Condition Photos</p>
          <h1 id="viewerCardName">Pokemon Card</h1>
        </div>
        <p id="viewerCardMeta"></p>
      </header>

      <section class="condition-viewer-grid" aria-label="Card front and back photos">
        <article class="condition-viewer-panel">
          <h2>FRONT</h2>
          <div class="condition-viewer-frame">
            <img id="viewerFrontImage" alt="Card front">
          </div>
        </article>
        <article class="condition-viewer-panel">
          <h2>BACK</h2>
          <div class="condition-viewer-frame">
            <img id="viewerBackImage" alt="Card back">
          </div>
        </article>
      </section>
    </main>

    <script src="script.js?v=card-viewer-1"></script>
  </body>
</html>
